<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not In Your Head</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #CA6F1E;
    --navy: #1F3A5F;
    --sage: #D4E0D8;
    --off-white: #F2F0EB;
    --muted: #6A6A62;
    --amber-light: #FEF5E7;
    --navy-light: #EEF2F6;
    --green: #1E8449;
    --green-light: #EAF5EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sage); min-height: 100vh; color: #1a1a1a; }
  .app { max-width: 660px; margin: 0 auto; min-height: 100vh; background: var(--off-white); box-shadow: 0 0 60px rgba(31,58,95,0.15); }
  .header { background: var(--navy); padding: 28px 36px 24px; position: relative; overflow: hidden; }
  .header::after { content: ''; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px; background: var(--orange); opacity: 0.07; border-radius: 50%; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--orange); margin-bottom: 4px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.5); font-style: italic; font-family: 'Playfair Display', serif; }
  .progress-bar { height: 3px; background: rgba(202,111,30,0.2); }
  .progress-fill { height: 100%; background: var(--orange); transition: width 0.4s ease; width: 0%; }
  .screen { display: none; padding: 32px 36px; animation: fadeIn 0.3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
  .screen-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--navy); line-height: 1.3; margin-bottom: 16px; }
  .screen-body { font-size: 14px; line-height: 1.8; color: var(--muted); margin-bottom: 20px; }
  .lang-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 40px 36px; }
  .lang-logo { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; color: var(--navy); margin-bottom: 8px; text-align: center; }
  .lang-tag { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 48px; text-align: center; }
  .lang-buttons { display: flex; gap: 16px; width: 100%; max-width: 300px; }
  .lang-btn { flex: 1; padding: 20px 12px; border-radius: 12px; border: 2px solid #E8E4DC; background: white; cursor: pointer; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--navy); transition: all 0.2s; text-align: center; }
  .lang-btn:hover { border-color: var(--orange); background: var(--amber-light); transform: translateY(-2px); }
  .lang-flag { font-size: 30px; display: block; margin-bottom: 8px; }
  .wbox { border-radius: 0 8px 8px 0; padding: 16px 18px; margin-bottom: 16px; }
  .wbox.amber { background: var(--amber-light); border-left: 4px solid var(--orange); }
  .wbox.navy { background: var(--navy-light); border-left: 4px solid var(--navy); }
  .wbox-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
  .wbox.amber .wbox-title { color: #7D4E00; }
  .wbox.amber .wbox-body { color: #7D4E00; font-size: 13px; line-height: 1.65; }
  .wbox.navy .wbox-title { color: var(--navy); }
  .wbox.navy .wbox-body { color: #2C4A6E; font-size: 13px; line-height: 1.65; }
  .q-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .q-card { border: 2px solid #E8E4DC; border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all 0.2s; background: white; display: flex; gap: 14px; align-items: flex-start; }
  .q-card:hover { border-color: var(--orange); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(202,111,30,0.1); }
  .q-card.selected { border-color: var(--orange); background: var(--amber-light); }
  .q-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-top: 2px; }
  .q-name { font-size: 14px; font-weight: 500; color: var(--navy); margin-bottom: 3px; }
  .q-desc { font-size: 12px; color: var(--muted); line-height: 1.45; margin-bottom: 4px; }
  .q-time { font-size: 11px; color: var(--orange); font-weight: 500; margin-bottom: 2px; }
  .q-val { font-size: 10px; color: var(--green); font-weight: 500; margin-bottom: 2px; }
  .q-official { font-size: 10px; color: var(--green); font-weight: 500; }
  .q-trans { font-size: 10px; color: #D4880A; font-weight: 500; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s; text-align: center; }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover:not(:disabled) { background: #a85a14; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); width: auto; padding: 10px 20px; font-size: 13px; }
  .btn-ghost:hover { background: var(--navy); color: white; }
  .two-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .two-btn { flex: 1; padding: 14px; border-radius: 8px; border: 2px solid #E8E4DC; background: white; cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--navy); transition: all 0.2s; text-align: center; }
  .two-btn:hover { border-color: var(--orange); }
  .two-btn.selected { border-color: var(--orange); background: var(--amber-light); }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .q-badge { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; color: white; }
  .q-counter { font-size: 12px; color: var(--muted); margin-left: auto; }
  .question-text { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--navy); line-height: 1.45; margin-bottom: 6px; }
  .question-note { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 12px; }
  .honesty-note { font-size: 11px; color: var(--navy); background: var(--navy-light); border-radius: 6px; padding: 8px 12px; margin-bottom: 18px; line-height: 1.5; }
  .part-label { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; margin-top: 16px; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .option { padding: 12px 16px; border-radius: 8px; border: 2px solid #E8E4DC; cursor: pointer; font-size: 14px; color: #1a1a1a; transition: all 0.15s; background: white; display: flex; align-items: center; gap: 12px; }
  .option:hover { border-color: var(--orange); }
  .option.selected { border-color: var(--orange); background: var(--amber-light); font-weight: 500; color: var(--navy); }
  .radio { width: 17px; height: 17px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; }
  .option.selected .radio { border-color: var(--orange); background: var(--orange); }
  .grade-card { border: 2px solid #E8E4DC; border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all 0.2s; background: white; margin-bottom: 10px; }
  .grade-card:hover { border-color: var(--orange); }
  .grade-card.selected { border-color: var(--orange); background: var(--amber-light); }
  .grade-num { font-size: 11px; font-weight: 500; color: var(--orange); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .grade-title { font-size: 14px; font-weight: 500; color: var(--navy); margin-bottom: 4px; }
  .grade-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .sas-yn { display: flex; gap: 10px; margin-bottom: 12px; }
  .sas-btn { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #E8E4DC; background: white; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; text-align: center; }
  .sas-btn:hover { border-color: var(--orange); }
  .sas-btn.yes { border-color: var(--orange); background: var(--amber-light); color: var(--navy); }
  .sas-btn.no { border-color: #ccc; background: #f5f5f5; color: var(--muted); }
  .sas-sev { display: none; margin-top: 4px; }
  .sas-sev.show { display: block; }
  .sas-sev-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-style: italic; }
  .nav-row { display: flex; gap: 10px; align-items: center; }
  .nav-row .btn-primary { flex: 1; }
  .result-hero { background: var(--navy); margin: -32px -36px 28px; padding: 28px 36px; position: relative; overflow: hidden; }
  .result-hero::after { content: ''; position: absolute; bottom: -40px; right: -40px; width: 130px; height: 130px; background: var(--orange); opacity: 0.12; border-radius: 50%; }
  .r-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .r-score { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900; color: var(--orange); line-height: 1; }
  .r-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .r-qname { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 10px; font-style: italic; font-family: 'Playfair Display', serif; }
  .band-box { border-radius: 10px; padding: 18px 22px; margin-bottom: 16px; }
  .band-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .band-body { font-size: 13px; line-height: 1.7; }
  .ai-box { background: white; border: 1px solid #E8E4DC; border-radius: 10px; padding: 20px 22px; margin-bottom: 16px; }
  .ai-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
  .ai-body { font-size: 14px; line-height: 1.8; color: #1a1a1a; }
  .loading { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .loading-text { font-size: 13px; color: var(--muted); font-style: italic; }
  .dots { display: flex; gap: 5px; }
  .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); animation: pulse 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-7px);opacity:1} }
  .next-box { background: var(--navy); border-radius: 10px; padding: 20px 22px; margin-bottom: 16px; }
  .next-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--orange); margin-bottom: 14px; }
  .next-item { display: flex; gap: 12px; margin-bottom: 10px; }
  .next-num { width: 22px; height: 22px; border-radius: 50%; background: var(--orange); color: white; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .next-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.55; }
  .attr-box { background: var(--navy-light); border-radius: 10px; padding: 18px 22px; margin-bottom: 16px; }
  .attr-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--navy); margin-bottom: 12px; }
  .attr-name { font-weight: 500; font-size: 13px; color: var(--navy); margin-bottom: 4px; }
  .attr-val { font-size: 11px; color: var(--green); font-weight: 500; margin-bottom: 4px; }
  .attr-official { font-size: 11px; color: var(--green); font-weight: 500; margin-bottom: 4px; }
  .attr-trans { font-size: 11px; color: #D4880A; font-weight: 500; margin-bottom: 4px; }
  .attr-note { font-size: 11px; color: #7D4E00; background: var(--amber-light); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; line-height: 1.5; }
  .attr-citation { font-size: 12px; color: #2C4A6E; line-height: 1.6; margin-top: 8px; }
  .footer-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; padding-top: 16px; border-top: 1px solid #E8E4DC; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Not In Your Head</div>
    <div class="header-sub" id="headerSub">Clinical Self-Assessment</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>

  <!-- LANGUAGE -->
  <div class="screen active" id="s-lang">
    <div class="lang-wrap">
      <div class="lang-logo">Not In Your Head</div>
      <div class="lang-tag">Select your language / Vælg dit sprog</div>
      <div class="lang-buttons">
        <button class="lang-btn" onclick="setLang('en')"><span class="lang-flag">🇬🇧</span>English</button>
        <button class="lang-btn" onclick="setLang('da')"><span class="lang-flag">🇩🇰</span>Dansk</button>
      </div>
    </div>
  </div>

  <!-- WELCOME -->
  <div class="screen" id="s-welcome">
    <div class="eyebrow" id="w-ey"></div>
    <div class="screen-title" id="w-ti"></div>
    <div class="screen-body" id="w-bo"></div>
    <div class="wbox amber"><div class="wbox-title" id="w-i-ti"></div><div class="wbox-body" id="w-i-bo"></div></div>
    <div class="wbox navy"><div class="wbox-title" id="w-h-ti"></div><div class="wbox-body" id="w-h-bo"></div></div>
    <button class="btn btn-primary" id="w-btn" onclick="showSelect()"></button>
  </div>

  <!-- SELECT -->
  <div class="screen" id="s-select">
    <div class="eyebrow" id="sel-ey"></div>
    <div class="screen-title" id="sel-ti"></div>
    <div class="screen-body" id="sel-bo"></div>
    <div class="q-grid" id="qGrid"></div>
    <button class="btn btn-primary" id="startBtn" disabled onclick="startQ()"></button>
  </div>

  <!-- GENDER -->
  <div class="screen" id="s-gender">
    <div class="eyebrow" id="g-ey"></div>
    <div class="screen-title" id="g-ti"></div>
    <div class="screen-body" id="g-bo"></div>
    <div class="two-row">
      <button class="two-btn" id="gF" onclick="selectGender('female')"></button>
      <button class="two-btn" id="gM" onclick="selectGender('male')"></button>
    </div>
    <button class="btn btn-primary" id="gCont" disabled onclick="initQ()"></button>
  </div>

  <!-- QUESTIONS -->
  <div class="screen" id="s-questions">
    <div class="q-meta">
      <div class="q-badge" id="qBadge"></div>
      <div class="q-counter" id="qCtr"></div>
    </div>
    <div class="question-text" id="qText"></div>
    <div class="question-note" id="qNote"></div>
    <div class="honesty-note" id="hNote"></div>
    <div id="qBody"></div>
    <div class="nav-row">
      <button class="btn-ghost btn" id="backBtn" onclick="prevQ()"></button>
      <button class="btn btn-primary" id="nextBtn" disabled onclick="nextQ()"></button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="s-results">
    <div class="result-hero">
      <div class="r-label" id="rLbl"></div>
      <div class="r-score" id="rScore"></div>
      <div class="r-sub" id="rSub"></div>
      <div class="r-qname" id="rQName"></div>
    </div>
    <div class="band-box" id="bandBox"></div>
    <div class="ai-box">
      <div class="ai-label" id="rAiLbl"></div>
      <div class="ai-body" id="aiBox">
        <div class="loading"><div class="dots"><span></span><span></span><span></span></div><div class="loading-text" id="rLoad"></div></div>
      </div>
    </div>
    <div class="next-box" id="nextBox"></div>
    <div class="attr-box" id="attrBox"></div>
    <button class="btn btn-primary" style="margin-bottom:16px" id="rAnother" onclick="showSelect()"></button>
    <div class="footer-note" id="rFooter"></div>
  </div>
</div>

<script>
// ── Translations ─────────────────────────────────────────────────────────────
const T = {
  en: {
    headerSub:'Clinical Self-Assessment',
    wEy:'Before you begin', wTi:'Understanding your symptoms starts here',
    wBo:'These four questionnaires each measure a different aspect of complex chronic illness: fatigue severity, post-viral functional status, ME/CFS symptom burden, and autonomic dysfunction. Together they build a picture of your dominant symptom pattern.\n\nEach tool is validated and used by healthcare professionals in clinical practice. Completing them gives you structured, evidence-based language to describe what you are experiencing and something concrete to bring to your doctor.\n\nThey do not diagnose. But they give you and your clinician a clearer starting point.\n\nThis app contains four freely available, validated questionnaires. Other recognised tools such as the Chalder Fatigue Scale and COMPASS-31 are not included as they are protected by copyright. You can access them through your doctor or a specialist clinic.',
    wITi:'Important — please read first',
    wIBo:'These tools do not diagnose. Several common and treatable conditions can produce similar symptoms and lead to false positive results, including depression, anxiety, hypothyroidism, iron deficiency and sleep apnoea. These are examples only and other similar conditions exist. We therefore recommend that you are assessed for these by your own doctor before using the results here as a basis for further investigation.',
    wHTi:'A note on honesty',
    wHBo:'These tools are only useful if you answer honestly. Before each question ask yourself: is this genuinely different from how I was before? Has it been consistent over months, not just a bad week? If the honest answer is no, answer no. It can be a good idea to go through the questions with a family member or close friend who knows you well and can help you assess whether your answers reflect reality. Honest answers give useful results. Inflated answers mislead you.',

    selEy:'Step 1 of 3', selTi:'Choose your questionnaire', selBo:'Select the one that best matches your situation. You can return and try others.',

    gF:'Female', gM:'Male', gCont:'Continue',
    back:'Back', next:'Next', seeResults:'See results',
    hNote:'Answer based on what is genuinely different for you, not what could apply to anyone on a bad day.',
    rLbl:'Your result', rAiLbl:'Personalised interpretation', rLoad:'Analysing your responses...',
    rNextLbl:'What to do next',
    rN1:'Screenshot or save this result to share with your doctor.',
    rN2:'Book an appointment with your GP and bring this result.',
    rN3:'Read the book with your dominant pattern in mind. Your highest-scoring symptoms point to the most relevant sections.',
    rAttrLbl:'About this questionnaire',
    rVal:'Validated clinical tool',
    rOfficial:'Official Danish version',
    rTrans:'Translated by the publisher',
    rTransNote:'This is not an officially validated translation. The validated English version should be used if in doubt.',

    dsqSLbl:'Severity — how much has it bothered you?',
    dsqFOpts:['None of the time','A little of the time','About half the time','Most of the time','All of the time'],
    dsqSOpts:['Not present','Mild','Moderate','Severe','Very severe'],
    sasYes:'Yes, I have this', sasNo:'No, I do not',
    sasSSymLbl:'How much does it bother you?',
    sasSConLbl:'How often do you experience this?',
    sasSSymOpts:['Not at all','A little','Some','A moderate amount','A lot'],
    sasSConOpts:['Never','Occasionally','Sometimes','Often','All the time'],
    grade:'Grade',
    scoreSubDsq:'symptoms meeting clinical threshold',
    scoreSubFss:'mean score out of 7',
    scoreSubSas:'symptoms present, total impact score'
  },
  da: {
    headerSub:'Klinisk selvvurdering',
    wEy:'Inden du starter', wTi:'Forstå dine symptomer her',
    wBo:'Disse fire spørgeskemaer måler hver især et forskelligt aspekt af kompleks kronisk sygdom: træthedssværhedsgrad, post-viral funktionsstatus, ME/CFS-symptombyrde og autonom dysfunktion. Tilsammen tegner de et billede af dit dominerende symptommønster.\n\nHvert redskab er valideret og bruges af sundhedsprofessionelle i klinisk praksis. At udfylde dem giver dig et struktureret, evidensbaseret sprog til at beskrive det du oplever og noget konkret at tage med til din læge.\n\nDe stiller ingen diagnose. Men de giver dig og din kliniker et klarere udgangspunkt.\n\nDenne app indeholder fire frit tilgængelige, validerede spørgeskemaer. Andre anerkendte redskaber som Chalder Fatigue Scale og COMPASS-31 er ikke inkluderet da de er ophavsretligt beskyttet. Du kan finde dem via din læge eller en specialiseret klinik.',
    wITi:'Vigtigt — læs venligst dette først',
    wIBo:'Disse redskaber stiller ingen diagnose. Flere almindelige og behandlelige tilstande kan give lignende symptomer og føre til falsk positive resultater, herunder depression, angst, hypothyroidisme, jernmangel og søvnapnø. Dette er blot eksempler, og der findes andre lignende tilstande. Vi anbefaler derfor at du bliver udredt for disse hos din egen læge inden du bruger resultaterne her som grundlag for videre undersøgelse.',
    wHTi:'En note om ærlighed',
    wHBo:'Disse redskaber er kun nyttige hvis du svarer ærligt. Spørg dig selv før hvert spørgsmål: er dette genuint anderledes end før? Har det stået på i måneder, ikke bare en dårlig uge? Hvis det ærlige svar er nej, svar nej. Det kan være en god idé at have et familiemedlem eller en nær ven med til at gennemgå spørgsmålene, én der kender dig godt og kan hjælpe dig med at vurdere om dine svar afspejler virkeligheden. Ærlige svar giver brugbare resultater. Oppustede svar vildleder dig.',
    wBtn:'Jeg forstår — fortsæt',
    selEy:'Trin 1 af 3', selTi:'Vælg dit spørgeskema', selBo:'Vælg det der passer bedst til din situation. Du kan vende tilbage og prøve de andre.',
    startBtn:'Start vurdering',

let lang='en', qIdx=null, curQ=0, gender=null;
let ans=[], fAns=[], sAns=[], sasAns=[];

// ── Utils ─────────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const t=k=>T[lang][k]||T.en[k]||k;
const qq=()=>QS[lang][qIdx];
const getQs=()=>{
  const q=qq();
  if(q.type==='sas') return gender==='male'?q.questions:q.questions.filter(x=>!x.maleOnly);
  if(q.type==='pcfs') return q.grades;
  return q.questions;
};
function prog(p){$('pFill').style.width=p+'%';}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0);}

// ── Language ──────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  $('headerSub').textContent=t('headerSub');
  $('w-ey').textContent=t('wEy');
  $('w-ti').textContent=t('wTi');
  $('w-bo').innerHTML=t('wBo').split('\n\n').map(p=>`<p style="margin-bottom:10px">${p}</p>`).join('');
  $('w-i-ti').textContent=t('wITi');
  $('w-i-bo').textContent=t('wIBo');
  $('w-h-ti').textContent=t('wHTi');
  $('w-h-bo').textContent=t('wHBo');
  $('w-btn').textContent=t('wBtn');
  show('s-welcome');
  prog(5);
}

// ── Select ────────────────────────────────────────────────────────────────────
function showSelect(){
  $('sel-ey').textContent=t('selEy');
  $('sel-ti').textContent=t('selTi');
  $('sel-bo').textContent=t('selBo');
  $('startBtn').textContent=t('startBtn');
  $('startBtn').disabled=true;
  qIdx=null;
  $('qGrid').innerHTML=QS[lang].map((q,i)=>{
    let langLine='';
    if(lang==='da'){
      langLine=q.officialDa
        ?`<div class="q-official">&#10003; ${q.officialDaSource}</div>`
        :`<div class="q-trans">&#8635; ${t('rTrans')}</div>`;
    }
    return `<div class="q-card" id="qc${i}" onclick="selQ(${i})">
      <div class="q-icon" style="background:${q.bg}">${q.icon}</div>
      <div>
        <div class="q-name">${q.name}</div>
        <div class="q-desc">${q.desc}</div>
        <div class="q-time">${q.time}</div>
        <div class="q-val">&#10003; ${q.val}</div>
        ${langLine}
      </div>
    </div>`;
  }).join('');
  show('s-select');
  prog(10);
}

function selQ(i){
  document.querySelectorAll('.q-card').forEach(c=>c.classList.remove('selected'));
  $('qc'+i).classList.add('selected');
  qIdx=i;
  $('startBtn').disabled=false;
}

function startQ(){
  const q=qq();
  if(q.requiresGender){
    gender=null;
    $('g-ey').textContent=t('gEy');
    $('g-ti').textContent=t('gTi');
    $('g-bo').textContent=t('gBo');
    $('gF').textContent=t('gF');
    $('gM').textContent=t('gM');
    $('gCont').textContent=t('gCont');
    $('gCont').disabled=true;
    $('gF').classList.remove('selected');
    $('gM').classList.remove('selected');
    show('s-gender');
  } else { initQ(); }
}

function selectGender(g){
  gender=g;
  $('gF').classList.toggle('selected',g==='female');
  $('gM').classList.toggle('selected',g==='male');
  $('gCont').disabled=false;
}

// ── Questions ─────────────────────────────────────────────────────────────────
function initQ(){
  curQ=0;
  const n=getQs().length;
  ans=new Array(n).fill(null);
  fAns=new Array(n).fill(null);
  sAns=new Array(n).fill(null);
  sasAns=getQs().map(()=>({present:null,severity:null}));
  renderQ();
  show('s-questions');
  prog(20);
}

function renderQ(){
  const q=qq(), qs=getQs(), n=qs.length, item=qs[curQ];
  $('qBadge').textContent=q.name;
  $('qBadge').style.background=q.color;
  $('qCtr').textContent=`${curQ+1} / ${n}`;
  $('hNote').textContent=t('hNote');
  $('backBtn').textContent=t('back');
  prog(20+((curQ/n)*65));
  const nb=$('nextBtn');
  nb.textContent=curQ===n-1?t('seeResults'):t('next');

  if(q.type==='pcfs'){
    $('qText').textContent=lang==='da'?'Vælg det trin der bedst beskriver din situation den seneste uge':'Choose the grade that best describes your situation over the past week';
    $('qNote').textContent=q.instruction;
    renderPCFS(q); nb.disabled=ans[0]===null; return;
  }
  if(q.type==='dsq'){
    $('qText').textContent=item;
    $('qNote').textContent=q.instruction;
    renderDSQ(q); nb.disabled=fAns[curQ]===null||sAns[curQ]===null; return;
  }
  if(q.type==='sas'){
    $('qText').textContent=item.text;
    $('qNote').textContent=item.sub||'';
    renderSAS(q,item);
    const a=sasAns[curQ];
    nb.disabled=a.present===null||(a.present===true&&a.severity===null); return;
  }
  $('qText').textContent=item.text;
  $('qNote').textContent=q.instruction;
  renderFSS(q); nb.disabled=ans[curQ]===null;
}

function renderFSS(q){
  $('qBody').innerHTML=`<div class="options">${q.options.map((o,i)=>`<div class="option ${ans[curQ]===i?'selected':''}" onclick="selFSS(${i})"><div class="radio"></div>${o.l}</div>`).join('')}</div>`;
}
function selFSS(i){ans[curQ]=i;document.querySelectorAll('.option').forEach((el,j)=>el.classList.toggle('selected',j===i));$('nextBtn').disabled=false;}

function renderDSQ(q){
  const fo=t('dsqFOpts'),so=t('dsqSOpts');
  $('qBody').innerHTML=`
    <div class="part-label">${t('dsqFLbl')}</div>
    <div class="options" id="fo">${fo.map((o,i)=>`<div class="option ${fAns[curQ]===i?'selected':''}" onclick="selF(${i})"><div class="radio"></div>${o}</div>`).join('')}</div>
    <div class="part-label">${t('dsqSLbl')}</div>
    <div class="options" id="so">${so.map((o,i)=>`<div class="option ${sAns[curQ]===i?'selected':''}" onclick="selS(${i})"><div class="radio"></div>${o}</div>`).join('')}</div>`;
}
function selF(i){fAns[curQ]=i;document.querySelectorAll('#fo .option').forEach((el,j)=>el.classList.toggle('selected',j===i));$('nextBtn').disabled=fAns[curQ]===null||sAns[curQ]===null;}
function selS(i){sAns[curQ]=i;document.querySelectorAll('#so .option').forEach((el,j)=>el.classList.toggle('selected',j===i));$('nextBtn').disabled=fAns[curQ]===null||sAns[curQ]===null;}

function renderPCFS(q){
  $('qBody').innerHTML=q.grades.map((g,i)=>`<div class="grade-card ${ans[0]===i?'selected':''}" onclick="selGrade(${i})"><div class="grade-num">${t('grade')} ${g.grade}</div><div class="grade-title">${g.title}</div><div class="grade-desc">${g.desc}</div></div>`).join('');
}
function selGrade(i){ans[0]=i;document.querySelectorAll('.grade-card').forEach((el,j)=>el.classList.toggle('selected',j===i));$('nextBtn').disabled=false;}

function renderSAS(q,item){
  const a=sasAns[curQ];
  const isCond=item.type==='condition';
  const sevLbl=isCond?t('sasSConLbl'):t('sasSSymLbl');
  const sevOpts=isCond?t('sasSConOpts'):t('sasSSymOpts');
  $('qBody').innerHTML=`
    <div class="sas-yn">
      <button class="sas-btn ${a.present===true?'yes':''}" onclick="sasPres(true)">${t('sasYes')}</button>
      <button class="sas-btn ${a.present===false?'no':''}" onclick="sasPres(false)">${t('sasNo')}</button>
    </div>
    <div class="sas-sev ${a.present===true?'show':''}" id="sasSev">
      <div class="sas-sev-label">${sevLbl}</div>
      <div class="options">${sevOpts.map((o,i)=>`<div class="option ${a.severity===i+1?'selected':''}" onclick="sasSev(${i+1})"><div class="radio"></div>${o}</div>`).join('')}</div>
    </div>`;
}
function sasPres(v){sasAns[curQ].present=v;if(!v)sasAns[curQ].severity=null;renderSAS(qq(),getQs()[curQ]);const a=sasAns[curQ];$('nextBtn').disabled=a.present===null||(a.present===true&&a.severity===null);}
function sasSev(v){sasAns[curQ].severity=v;document.querySelectorAll('#sasSev .option').forEach((el,i)=>el.classList.toggle('selected',i+1===v));$('nextBtn').disabled=false;}

function prevQ(){if(curQ>0){curQ--;renderQ();}else{qq().requiresGender?show('s-gender'):showSelect();}}
function nextQ(){const n=getQs().length;if(curQ<n-1){curQ++;renderQ();}else showResults();}

// ── Results ───────────────────────────────────────────────────────────────────
async function showResults(){
  const q=qq();
  prog(90);
  show('s-results');
  $('rLbl').textContent=t('rLbl');
  $('rAiLbl').textContent=t('rAiLbl');
  $('rLoad').textContent=t('rLoad');
  $('rAnother').textContent=t('rAnother');
  $('rFooter').innerHTML=t('rFooter').split('\n\n').map(p=>`<p style="margin-bottom:6px">${p}</p>`).join('');

  let score,sub,band,summary;

  if(q.type==='dsq'){
    const m=i=>(fAns[i]||0)>=2&&(sAns[i]||0)>=2;
    const fat=m(0),pem=m(1)||m(2),unref=m(3),neuro=m(6)||m(7);
    const dPain=m(4)||m(5),dAuto=m(8)||m(9),dNE=m(10)||m(11),dImm=m(12)||m(13);
    const addDom=[dPain,dAuto,dNE,dImm].filter(Boolean).length;
    const core=[fat,pem,unref,neuro].filter(Boolean).length;
    const canMet=fat&&pem&&unref&&neuro&&addDom>=2;
    const tot=q.questions.filter((_,i)=>m(i)).length;
    score=`${tot} / 14`;
    sub=t('scoreSubDsq');
    band=canMet?q.bands[2]:(core>=3||tot>=5)?q.bands[1]:q.bands[0];
    summary=[`Threshold met: ${tot}/14`,`Core: fat=${fat},pem=${pem},sleep=${unref},cog=${neuro}`,`Domains: pain=${dPain},auto=${dAuto},NE=${dNE},imm=${dImm}`,`Canadian criteria: ${canMet}`,'',
      ...q.questions.map((item,i)=>`${item}: F=${fAns[i]}/4 S=${sAns[i]}/4`)].join('\n');

  } else if(q.type==='fss'){
    const vals=ans.map(a=>q.options[a]?.v||0);
    const mean=vals.reduce((s,v)=>s+v,0)/vals.length;
    score=mean.toFixed(1);
    sub=t('scoreSubFss');
    band=q.bands.find(b=>mean<=b.maxScore)||q.bands[q.bands.length-1];
    summary=q.questions.map((item,i)=>`${item.text}: ${q.options[ans[i]]?.l||'N/A'}`).join('\n');

  } else if(q.type==='pcfs'){
    const gi=ans[0],g=q.grades[gi];
    score=`${t('grade')} ${g.grade}`;
    sub=g.title;
    band=q.bands.find(b=>g.grade<=b.maxGrade)||q.bands[q.bands.length-1];
    summary=`Grade ${g.grade}: ${g.title}. ${g.desc}`;

  } else if(q.type==='sas'){
    const qsl=getQs();
    const cnt=sasAns.filter(a=>a.present===true).length;
    const imp=sasAns.reduce((s,a)=>s+(a.severity||0),0);
    score=cnt;
    sub=`${t('scoreSubSas')}: ${imp}`;
    band=q.bands.find(b=>cnt<=b.maxCount)||q.bands[q.bands.length-1];
    summary=qsl.map((item,i)=>{const a=sasAns[i];return `${item.text}: ${a.present?`Yes (sev:${a.severity})`:'No'}`;}).join('\n');
  }

  $('rScore').textContent=score;
  $('rSub').textContent=sub;
  $('rQName').textContent=q.name;
  $('bandBox').innerHTML=`<div class="band-title" style="color:${band.color}">${band.label}</div><div class="band-body">${band.body}</div>`;
  $('bandBox').style.background=band.bg;

  $('nextBox').innerHTML=`<div class="next-label">${t('rNextLbl')}</div>
    <div class="next-item"><div class="next-num">1</div><div class="next-text">${t('rN1')}</div></div>
    <div class="next-item"><div class="next-num">2</div><div class="next-text">${t('rN2')}</div></div>
    <div class="next-item"><div class="next-num">3</div><div class="next-text">${t('rN3')}</div></div>`;

  let transHtml='';
  if(lang==='da'){
    transHtml=q.officialDa
      ?`<div class="attr-official">&#10003; ${t('rOfficial')}</div>`
      :`<div class="attr-trans">&#8635; ${t('rTrans')}</div><div class="attr-note">${t('rTransNote')}</div>`;
  }
  $('attrBox').innerHTML=`<div class="attr-label">${t('rAttrLbl')}</div><div class="attr-name">${q.name}</div><div class="attr-val">&#10003; ${t('rVal')}</div>${transHtml}<div class="attr-citation">${q.attribution}</div>`;

  await interpret(q,score,band,summary);
  prog(100);
}

async function interpret(q,score,band,summary){
  const isDA=lang==='da';
  const prompt=`You are a compassionate health assistant helping someone understand their symptom assessment results.

A person completed the ${q.name} and their result is:
Score: ${score}
Band: ${band.label}

Their responses:
${summary}

Write a warm, honest, plain-language interpretation in 3 to 4 short paragraphs:
- Acknowledge what the score means for them personally in simple terms
- Highlight the 2 to 3 most significant responses
- Be honest but not alarmist
- End with one sentence of genuine encouragement grounded in the fact that understanding your symptom pattern is a useful starting point for working with a clinician

Critical rules: Do NOT mention any book, publication, or resource. Do NOT suggest reading anything. Do NOT reference any external tool or product. Focus only on the person and their results. Do not use medical jargon. Do not diagnose. Under 200 words. No bullet points, flowing prose only.${isDA?' Respond entirely in Danish.':''}`;

  try{
    const r=await fetch('/api/interpret',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    if(!r.ok) throw new Error('Server error: '+r.status);
    const d=await r.json();
    $('aiBox').innerHTML=`<div class="ai-body">${d.text.replace(/\n\n/g,'<br><br>')}</div>`;
  } catch(e){
    $('aiBox').innerHTML=`<div class="ai-body" style="color:var(--muted);font-style:italic;">${isDA?'Din score er beregnet ovenfor. Noget gik galt med fortolkningen. Prøv venligst igen.':'Your score has been calculated above. Something went wrong with the interpretation. Please try again.'}<br><br>Error: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
